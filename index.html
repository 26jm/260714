<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 추첨기</title>
  <style>
    :root {
      --primary: #0066cc;
      --primary-focus: #0071e3;
      --ink: #1d1d1f;
      --body: #1d1d1f;
      --body-muted: #6e6e73;
      --canvas: #ffffff;
      --canvas-parchment: #f5f5f7;
      --hairline: #e0e0e0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--canvas-parchment);
      color: var(--body);
    }

    .app {
      width: min(980px, 100%);
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 18px;
      overflow: hidden;
    }

    .hero {
      padding: 80px 32px 40px;
      background: var(--canvas-parchment);
      border-bottom: 1px solid var(--hairline);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 9999px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      font-size: 14px;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: var(--primary);
    }

    h1 {
      margin: 0;
      font-family: "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(40px, 6vw, 56px);
      line-height: 1.07;
      letter-spacing: -0.28px;
      color: var(--ink);
    }

    .sub {
      margin: 18px 0 0;
      max-width: 56rem;
      font-size: 17px;
      line-height: 1.47;
      letter-spacing: -0.374px;
      color: var(--body-muted);
    }

    .content {
      padding: 48px 32px 64px;
    }

    .numbers-wrap {
      background: var(--canvas-parchment);
      border: 1px solid var(--hairline);
      border-radius: 18px;
      padding: 24px;
    }

    .label {
      margin: 0 0 16px;
      font-size: 14px;
      color: var(--body-muted);
    }

    .numbers,
    .bonus-slot {
      display: grid;
      gap: 14px;
    }

    .numbers {
      grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
    }

    .bonus-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .bonus-text {
      font-size: 14px;
      color: var(--body-muted);
    }

    .ball {
      width: 74px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 9999px;
      font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: #ffffff;
      background: var(--primary);
      opacity: 0;
      transform: translateY(18px) scale(0.82);
      animation: popBall 520ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .ball.bonus {
      background: var(--primary-focus);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button-primary,
    .button-secondary {
      appearance: none;
      border-radius: 9999px;
      padding: 11px 22px;
      font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      font-weight: 400;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease;
    }

    .button-primary {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .button-secondary {
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--primary);
    }

    .button-primary:hover {
      background: var(--primary-focus);
      transform: translateY(-1px);
    }

    .button-secondary:hover {
      background: var(--canvas-parchment);
      transform: translateY(-1px);
    }

    .button-primary:active,
    .button-secondary:active {
      transform: scale(0.95);
    }

    .hint {
      font-size: 14px;
      color: var(--body-muted);
    }

    .history {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--hairline);
    }

    .history h2 {
      margin: 0 0 14px;
      font-size: 21px;
      line-height: 1.19;
      letter-spacing: 0.231px;
      color: var(--ink);
    }

    .history ul {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .history li {
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      font-size: 17px;
      line-height: 1.47;
      color: var(--body);
    }

    .summary {
      margin-top: 16px;
      font-size: 17px;
      line-height: 1.47;
      color: var(--primary);
    }

    .flash {
      animation: flashBg 600ms ease;
    }

    @keyframes popBall {
      0% { opacity: 0; transform: translateY(18px) scale(0.82); }
      60% { opacity: 1; transform: translateY(-4px) scale(1.04); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes flashBg {
      0% { box-shadow: inset 0 0 0 rgba(0, 102, 204, 0); }
      30% { box-shadow: inset 0 0 0 9999px rgba(0, 102, 204, 0.04); }
      100% { box-shadow: inset 0 0 0 rgba(0, 102, 204, 0); }
    }

    @media (max-width: 640px) {
      .hero,
      .content {
        padding-left: 18px;
        padding-right: 18px;
      }

      .hero {
        padding-top: 48px;
      }

      .controls {
        align-items: stretch;
      }

      .button-row {
        width: 100%;
      }

      .button-primary,
      .button-secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="hero">
      <div class="eyebrow"><span class="dot"></span> 실시간 추첨기</div>
      <h1>로또 추첨기</h1>
      <p class="sub">버튼을 누르면 1부터 45까지에서 중복 없이 6개를 뽑고, 보너스 번호 1개를 함께 보여줍니다. 추첨 결과는 Supabase 데이터베이스에 저장됩니다.</p>
    </section>

    <section class="content">
      <div class="numbers-wrap">
        <p class="label">당첨 번호 6개</p>
        <section class="numbers" id="numbers" aria-live="polite" aria-label="당첨 번호"></section>
        <div class="bonus-line">
          <div class="bonus-text">보너스 번호</div>
          <div class="bonus-slot" id="bonusSlot"></div>
        </div>
      </div>

      <div class="controls">
        <div class="button-row">
          <button class="button-primary" id="drawBtn" type="button">새로 뽑기</button>
          <button class="button-secondary" id="resetBtn" type="button">기록 초기화</button>
        </div>
        <div class="hint" id="statusText">매번 새 번호를 생성합니다.</div>
      </div>

      <div class="history">
        <h2>최근 추첨</h2>
        <ul id="history"></ul>
        <div class="summary" id="summary">아직 추첨되지 않았습니다.</div>
      </div>
    </section>
  </main>

  <script>
    const app = document.getElementById("app");
    const numbersEl = document.getElementById("numbers");
    const bonusSlotEl = document.getElementById("bonusSlot");
    const historyEl = document.getElementById("history");
    const summaryEl = document.getElementById("summary");
    const statusTextEl = document.getElementById("statusText");
    const drawBtn = document.getElementById("drawBtn");
    const resetBtn = document.getElementById("resetBtn");
    const history = [];

    function drawLottery() {
      const pool = Array.from({ length: 45 }, (_, i) => i + 1);
      const picked = [];

      while (picked.length < 7) {
        const index = Math.floor(Math.random() * pool.length);
        picked.push(pool.splice(index, 1)[0]);
      }

      return {
        main: picked.slice(0, 6).sort((a, b) => a - b),
        bonus: picked[6]
      };
    }

    function createBall(num, type, delay) {
      const ball = document.createElement("div");
      ball.className = `ball ${type}`;
      ball.textContent = num;
      ball.style.animationDelay = `${delay}ms`;
      return ball;
    }

    function renderNumbers(main, bonus) {
      numbersEl.innerHTML = "";
      bonusSlotEl.innerHTML = "";

      main.forEach((num, index) => {
        numbersEl.appendChild(createBall(num, "primary", index * 90));
      });

      bonusSlotEl.appendChild(createBall(bonus, "bonus", 620));
    }

    function renderHistory() {
      historyEl.innerHTML = "";
      history.slice(0, 5).forEach((item, index) => {
        const li = document.createElement("li");
        li.textContent = `${index + 1}회차: ${item.main.join(", ")} + 보너스 ${item.bonus}`;
        historyEl.appendChild(li);
      });
    }

    function animateApp() {
      app.classList.remove("flash");
      void app.offsetWidth;
      app.classList.add("flash");
    }

    drawBtn.addEventListener("click", () => {
      const result = drawLottery();
      history.unshift(result);
      renderNumbers(result.main, result.bonus);
      renderHistory();
      summaryEl.textContent = `이번 추첨 결과: ${result.main.join(", ")} | 보너스 ${result.bonus}`;
      statusTextEl.textContent = "추첨이 완료되었습니다.";
      animateApp();
    });

    resetBtn.addEventListener("click", () => {
      history.length = 0;
      renderHistory();
      summaryEl.textContent = "기록이 초기화되었습니다.";
      statusTextEl.textContent = "매번 새 번호를 생성합니다.";
      animateApp();
    });

    const initial = drawLottery();
    renderNumbers(initial.main, initial.bonus);
    renderHistory();
    summaryEl.textContent = `초기 표시: ${initial.main.join(", ")} | 보너스 ${initial.bonus}`;
  </script>
</body>
</html>
